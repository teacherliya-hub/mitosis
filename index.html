<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>細胞分裂模擬器 (有絲分裂版)</title>
    <style>
        :root {
            --main-bg: #f0f2f5;      
            --canvas-bg: #ffffff;    
            --text-main: #1e293b;    
            
            --membrane-fill: #e2e8f0;   
            --membrane-stroke: #334155; 
            
            --btn-color: #10b981; 
            --btn-hover: #059669;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--main-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 2vmin;
            box-sizing: border-box;
            min-height: 100vh;
        }

        header {
            margin-bottom: 15px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        @media (min-width: 600px) {
            h1 { font-size: 26px; }
        }

        #canvas-container {
            width: 100%;
            max-width: min(800px, calc(55vh * 4 / 3)); 
            aspect-ratio: 4/3; 
            background-color: var(--canvas-bg); 
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); 
            overflow: hidden;
            position: relative;
            border: 1px solid #e5e7eb;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        #instruction-box {
            width: 100%;
            max-width: min(800px, calc(55vh * 4 / 3)); 
            background-color: #bbf7d0; 
            color: #14532d;
            padding: 14px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 800;
            font-size: 1.05rem;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        #controls {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: min(800px, calc(55vh * 4 / 3)); 
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: var(--btn-color);
            color: white;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            flex: 1 1 auto;
            min-width: 90px;
        }

        button:hover:not(:disabled) {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        @media (max-height: 700px) {
            header { margin-bottom: 8px; }
            h1 { font-size: 20px; }
            #instruction-box { padding: 8px; margin-top: 8px; font-size: 0.95rem; }
            #controls { margin-top: 8px; gap: 8px; }
            button { padding: 8px 16px; font-size: 0.9rem; }
        }

        #cell-membrane {
            transition: d 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            fill: var(--membrane-fill);
            stroke: var(--membrane-stroke);
            stroke-width: 4px;
            stroke-linejoin: round;
        }

        /* 原始中央母細胞核 */
        #nucleus {
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
            fill: rgba(56, 189, 248, 0.1);
            stroke: #0ea5e9;
            stroke-width: 3px;
            transform-origin: 400px 300px; 
        }

        /* 新增：兩極的子細胞核膜 */
        .nucleus-side {
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
            fill: rgba(56, 189, 248, 0.1);
            stroke: #0ea5e9;
            stroke-width: 3px;
        }
        #nucleus-left { transform-origin: 200px 300px; }
        #nucleus-right { transform-origin: 600px 300px; }

        .chromosome {
            transition: transform 1.5s ease-in-out;
        }

        .sister-left, .sister-right {
            transition: transform 1.5s ease-in-out, opacity 0.5s ease-in-out;
            transform-origin: 0 0; 
        }

        .gene-text {
            text-anchor: middle;
            dominant-baseline: middle;
            font-weight: 900;
            font-size: 18px;
            fill: #111;
            stroke: var(--canvas-bg); 
            stroke-width: 3px;
            paint-order: stroke;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <header>
        <h1>🔬 細胞分裂模擬器 (有絲分裂版)</h1>
    </header>

    <div id="canvas-container">
        <svg viewBox="0 0 800 600">
            <defs>
                <g id="chromatid-long">
                    <rect x="-12" y="-80" width="24" height="75" rx="12" fill="currentColor" />
                    <rect x="-12" y="5" width="24" height="75" rx="12" fill="currentColor" />
                    <rect x="-12" y="-53" width="24" height="18" fill="rgba(255, 255, 255, 0.4)" />
                    <circle cx="0" cy="0" r="7" fill="#fff" stroke="#999" stroke-width="1" />
                </g>

                <g id="chromatid-short">
                    <rect x="-10" y="-45" width="20" height="40" rx="10" fill="currentColor" />
                    <rect x="-10" y="5" width="20" height="40" rx="10" fill="currentColor" />
                    <rect x="-10" y="16" width="20" height="14" fill="rgba(255, 255, 255, 0.4)" />
                    <circle cx="0" cy="0" r="6" fill="#fff" stroke="#999" stroke-width="1" />
                </g>
            </defs>

            <!-- 數學運算外框路徑 -->
            <path id="cell-membrane" />
            
            <!-- 中央母核膜 (State 0, 1) -->
            <circle id="nucleus" cx="400" cy="300" r="220" />
            
            <!-- 左右兩側新核膜 (State 4, 5 開始形成) -->
            <!-- 【修改點 1】將核膜的半徑由 145 加大至 170，提供更完整的包覆空間 -->
            <circle id="nucleus-left" class="nucleus-side" cx="200" cy="300" r="170" opacity="0" />
            <circle id="nucleus-right" class="nucleus-side" cx="600" cy="300" r="170" opacity="0" />

            <g id="chromosome-A" class="chromosome">
                <g class="sister-left"><use href="#chromatid-long" style="color: #164e9e;" /><text x="0" y="-43" class="gene-text">A</text></g>
                <g class="sister-right"><use href="#chromatid-long" style="color: #164e9e;" /><text x="0" y="-43" class="gene-text">A</text></g>
            </g>

            <g id="chromosome-a" class="chromosome">
                <g class="sister-left"><use href="#chromatid-long" style="color: #9e1616;" /><text x="0" y="-43" class="gene-text">a</text></g>
                <g class="sister-right"><use href="#chromatid-long" style="color: #9e1616;" /><text x="0" y="-43" class="gene-text">a</text></g>
            </g>

            <g id="chromosome-B" class="chromosome">
                <g class="sister-left"><use href="#chromatid-short" style="color: #3b82f6;" /><text x="0" y="24" class="gene-text">B</text></g>
                <g class="sister-right"><use href="#chromatid-short" style="color: #3b82f6;" /><text x="0" y="24" class="gene-text">B</text></g>
            </g>

            <g id="chromosome-b" class="chromosome">
                <g class="sister-left"><use href="#chromatid-short" style="color: #ef4444;" /><text x="0" y="24" class="gene-text">b</text></g>
                <g class="sister-right"><use href="#chromatid-short" style="color: #ef4444;" /><text x="0" y="24" class="gene-text">b</text></g>
            </g>

        </svg>
    </div>

    <div id="instruction-box">載入中...</div>

    <div id="controls">
        <button id="btn-prev">上一步</button>
        <button id="btn-next">下一步</button>
        <button id="btn-reset">重新開始</button>
    </div>

    <script>
        let currentState = 0;

        // 全新升級 6 階段陣列 (加入獨立的 State 4 分裂末期)
        const stateData = [
            {   
                infoText: "State 0: 準備期 (4條單體染色體, 基因型 AaBb)",
                chrA: { x: 335, y: 245, rot: -25, spread: 0, splitDist: 0 },
                chra: { x: 460, y: 240, rot: 35,  spread: 0, splitDist: 0 },
                chrB: { x: 350, y: 380, rot: -50, spread: 0, splitDist: 0 },
                chrb: { x: 480, y: 360, rot: 15,  spread: 0, splitDist: 0 }
            },
            {   
                infoText: "State 1: 染色體複製 (DNA 數量加倍，形成 X 型)",
                chrA: { x: 335, y: 245, rot: -25, spread: 15, splitDist: 0 },
                chra: { x: 460, y: 240, rot: 35,  spread: 15, splitDist: 0 },
                chrB: { x: 350, y: 380, rot: -50, spread: 15, splitDist: 0 },
                chrb: { x: 480, y: 360, rot: 15,  spread: 15, splitDist: 0 }
            },
            {   
                infoText: "State 2: 分裂中期 - 所有染色體單獨排列於細胞中央 (無同源配對)",
                // 【修改點 2】所有 Y 座標往下平移 17px，抵銷長染色體的手臂長度差，達到真正的視覺置中
                chrA: { x: 400, y: 187, rot: 0, spread: 15, splitDist: 0 }, 
                chrb: { x: 400, y: 267, rot: 0, spread: 15, splitDist: 0 },
                chra: { x: 400, y: 367, rot: 0, spread: 15, splitDist: 0 },
                chrB: { x: 400, y: 447, rot: 0, spread: 15, splitDist: 0 }
            },
            {   
                infoText: "State 3: 分裂後期 - 著絲點斷裂，姊妹染色分體分離並移向兩極",
                chrA: { x: 400, y: 187, rot: 0, spread: 0, splitDist: 176 }, 
                chrb: { x: 400, y: 267, rot: 0, spread: 0, splitDist: 176 },
                chra: { x: 400, y: 367, rot: 0, spread: 0, splitDist: 176 },
                chrB: { x: 400, y: 447, rot: 0, spread: 0, splitDist: 176 }
            },
            {   
                // 【新增過渡階段】
                infoText: "State 4: 分裂末期 - 染色體抵達兩極重組為雙排，新核膜開始重新形成 (細胞質尚未斷裂)",
                // 【修正點】改用「視覺置中」，Y座標調整為 250 與 390，並加大 splitDist 至 235 抵銷縮放影響
                chrA: { x: 380, y: 250, rot: 0, spread: 0, splitDist: 235 }, 
                chra: { x: 420, y: 250, rot: 0, spread: 0, splitDist: 235 },
                chrB: { x: 380, y: 390, rot: 0, spread: 0, splitDist: 235 },
                chrb: { x: 420, y: 390, rot: 0, spread: 0, splitDist: 235 }
            },
            {   
                // 【最終完成階段】
                infoText: "State 5: 分裂完成！產生 2 個雙套 (2n) 子細胞，細胞質與核膜完全成形",
                chrA: { x: 380, y: 250, rot: 0, spread: 0, splitDist: 235 }, 
                chra: { x: 420, y: 250, rot: 0, spread: 0, splitDist: 235 },
                chrB: { x: 380, y: 390, rot: 0, spread: 0, splitDist: 235 },
                chrb: { x: 420, y: 390, rot: 0, spread: 0, splitDist: 235 }
            }
        ];

        const NUM_POINTS = 80;

        function getMembranePath(state) {
            // State 5: 細胞膜才真正斷裂成兩個圓圈
            if (state === 5) {
                let pts1 = [];
                let pts2 = [];
                for (let i = 0; i < NUM_POINTS; i++) {
                    let a = (i / NUM_POINTS) * Math.PI * 2;
                    pts1.push(`${(200 + 190 * Math.cos(a)).toFixed(1)},${(300 + 190 * Math.sin(a)).toFixed(1)}`);
                    pts2.push(`${(600 + 190 * Math.cos(a)).toFixed(1)},${(300 + 190 * Math.sin(a)).toFixed(1)}`);
                }
                return `M ${pts1.join(" L ")} Z M ${pts2.join(" L ")} Z`;
            }

            // State 0, 1, 2, 3, 4 的單一漸變路徑
            let pts = [];
            for (let i = 0; i < NUM_POINTS; i++) {
                let a = (i / NUM_POINTS) * Math.PI * 2;
                let x, y;

                if (state <= 1) {
                    // 完美圓形母細胞
                    x = 400 + 270 * Math.cos(a);
                    y = 300 + 270 * Math.sin(a);
                } else if (state === 2) {
                    // 微微拉長的橢圓形
                    x = 400 + 290 * Math.cos(a);
                    y = 300 + 270 * Math.sin(a);
                } else if (state === 3 || state === 4) {
                    // 極度寬廣的花生橢圓形 (State 3 與 State 4 維持相同的外框形狀)
                    x = 400 + 360 * Math.cos(a);
                    y = 300 + 260 * Math.sin(a);
                }
                pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
            }
            return `M ${pts.join(" L ")} Z`;
        }

        function renderState(stateIndex) {
            const data = stateData[stateIndex];
            
            document.getElementById('instruction-box').innerText = data.infoText;
            document.getElementById('cell-membrane').setAttribute('d', getMembranePath(stateIndex));
            
            // ===================================
            // 【核膜動態演繹】
            // ===================================
            const nucleus = document.getElementById('nucleus'); // 中央母核膜
            const nucLeft = document.getElementById('nucleus-left'); // 左新核膜
            const nucRight = document.getElementById('nucleus-right'); // 右新核膜

            // 控制母核膜 (State 0, 1 可見)
            if (stateIndex === 0) {
                nucleus.style.opacity = "1";
                nucleus.style.transform = "scale(0.85)";
                nucleus.style.strokeDasharray = "none";
            } else if (stateIndex === 1) {
                nucleus.style.opacity = "1";
                nucleus.style.transform = "scale(1)";
                nucleus.style.strokeDasharray = "10 10"; // 虛線解體
            } else {
                nucleus.style.opacity = "0"; // 完全消失
                nucleus.style.transform = "scale(1.1)";
            }

            // 控制兩極新核膜 (State 4 開始組裝，State 5 完備)
            if (stateIndex <= 3) {
                // 完全隱藏，狀態預備
                nucLeft.style.opacity = "0";
                nucRight.style.opacity = "0";
                nucLeft.style.transform = "scale(0.7)";
                nucRight.style.transform = "scale(0.7)";
            } else if (stateIndex === 4) {
                // State 4: 虛線淡入，正在形成
                nucLeft.style.opacity = "1";
                nucRight.style.opacity = "1";
                nucLeft.style.transform = "scale(0.85)";
                nucRight.style.transform = "scale(0.85)";
                nucLeft.style.strokeDasharray = "8 8";
                nucRight.style.strokeDasharray = "8 8";
            } else if (stateIndex === 5) {
                // State 5: 實線完成，擴展為正常大小
                nucLeft.style.opacity = "1";
                nucRight.style.opacity = "1";
                nucLeft.style.transform = "scale(1)";
                nucRight.style.transform = "scale(1)";
                nucLeft.style.strokeDasharray = "none";
                nucRight.style.strokeDasharray = "none";
            }

            // ===================================
            // 控制染色體位置與狀態
            // ===================================
            ['A', 'a', 'B', 'b'].forEach(id => {
                const chrConf = data['chr' + id];
                const group = document.getElementById('chromosome-' + id);
                
                // 染色體統一維持較為精巧的 85% 比例
                group.style.transform = `translate(${chrConf.x}px, ${chrConf.y}px) rotate(${chrConf.rot}deg) scale(0.85)`;

                const sisLeft = group.querySelector('.sister-left');
                const sisRight = group.querySelector('.sister-right');

                if (stateIndex === 0) {
                    sisRight.style.opacity = "0";
                } else {
                    sisRight.style.opacity = "1";
                }

                if (chrConf.splitDist > 0) {
                    sisLeft.style.transform = `translate(-${chrConf.splitDist}px, 0px) rotate(0deg)`;
                    sisRight.style.transform = `translate(${chrConf.splitDist}px, 0px) rotate(0deg)`;
                } else {
                    sisLeft.style.transform = `rotate(-${chrConf.spread}deg)`;
                    sisRight.style.transform = `rotate(${chrConf.spread}deg)`;
                }
            });

            // 更新按鈕 (最大狀態擴充至 5)
            document.getElementById('btn-prev').disabled = (stateIndex === 0);
            document.getElementById('btn-next').disabled = (stateIndex === 5);
        }

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (currentState > 0) {
                currentState--;
                renderState(currentState);
            }
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            if (currentState < 5) {
                currentState++;
                renderState(currentState);
            }
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            currentState = 0;
            renderState(currentState);
        });

        // 初始渲染
        renderState(currentState);
    </script>
</body>
</html>
